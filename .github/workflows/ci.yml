# Kenjutsu CI Pipeline
#
# Every gate that runs must be real. No fake green. No swallowed failures.
#
# Path-filtered: gates only run when relevant files change.
# Pixi-based: same environment local and CI. pixi.lock is the source of truth.
# SHA-pinned: all actions pinned by commit hash for supply-chain safety.
#
# Gate matrix:
#   Code gates: lint, typecheck, security, unit tests, integration tests
#   Infra gates: actionlint (workflow validation), gitleaks (secret scanning)
#   Build gate: Docker build (only when app code or Dockerfile changes)
#   ci-pass: always runs, checks whichever gates were triggered

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Change detection
  # ===========================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      build: ${{ steps.filter.outputs.build }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            code:
              - 'kenjutsu/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'pixi.lock'
            build:
              - 'kenjutsu/**'
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'pixi.lock'
            infra:
              - '.github/workflows/**'
              - 'Dockerfile*'
              - '.coderabbit.yaml'

  # ===========================================================================
  # Gate: Lint (pixi-based)
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: prefix-dev/setup-pixi@19eac09b398e3d0c747adc7921926a6d802df4da # v0.8.8
        with:
          environments: dev

      - name: Ruff check + format
        run: pixi run -e dev lint

  # ===========================================================================
  # Gate: Type Check (pixi-based)
  # ===========================================================================
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: prefix-dev/setup-pixi@19eac09b398e3d0c747adc7921926a6d802df4da # v0.8.8
        with:
          environments: dev

      - name: Pyright
        run: pixi run -e dev typecheck

  # ===========================================================================
  # Gate: Security (pixi-based, real failures only)
  # ===========================================================================
  security:
    name: Security
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: prefix-dev/setup-pixi@19eac09b398e3d0c747adc7921926a6d802df4da # v0.8.8
        with:
          environments: dev

      - name: Bandit — code security analysis
        run: pixi run -e dev security

      - name: pip-audit — dependency vulnerability scan
        run: pixi run -e dev -- pip-audit --strict

  # ===========================================================================
  # Gate: Secret Scanning (always runs on code or infra changes)
  # ===========================================================================
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Gate: Workflow Validation (runs on infra changes)
  # ===========================================================================
  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: reviewdog/action-actionlint@a40b7d35e62844ec9c0096ff3f5ff48579c90759 # v1
        with:
          reporter: github-pr-review

  # ===========================================================================
  # Gate: Unit Tests (pixi-based)
  # ===========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: prefix-dev/setup-pixi@19eac09b398e3d0c747adc7921926a6d802df4da # v0.8.8
        with:
          environments: dev

      - name: Run unit tests
        run: pixi run -e dev test

  # ===========================================================================
  # Gate: Integration Tests (pixi-based, Testcontainers provides PostgreSQL)
  # ===========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: prefix-dev/setup-pixi@19eac09b398e3d0c747adc7921926a6d802df4da # v0.8.8
        with:
          environments: dev

      - name: Run integration tests
        run: pixi run -e dev test-integration

  # ===========================================================================
  # Gate: Docker Build (only when app code or Dockerfile changes, not after failures)
  # ===========================================================================
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [changes, lint, typecheck, security, unit-tests, integration-tests]
    if: >-
      always()
      && needs.changes.outputs.build == 'true'
      && !contains(needs.lint.result, 'failure')
      && !contains(needs.typecheck.result, 'failure')
      && !contains(needs.security.result, 'failure')
      && !contains(needs.unit-tests.result, 'failure')
      && !contains(needs.integration-tests.result, 'failure')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          tags: kenjutsu:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # ci-pass — the one required status check for branch protection
  #
  # Runs on ALL PRs. Checks whichever gates were triggered.
  # Skipped gates (path filters) are treated as passing.
  # Only gates that ran and failed cause ci-pass to fail.
  # ===========================================================================
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, lint, typecheck, security, gitleaks, actionlint, unit-tests, integration-tests, build]
    steps:
      - name: Check triggered gates
        run: |
          failed=false

          # Code gates
          if [[ "${{ needs.changes.outputs.code }}" == "true" ]]; then
            echo "Code changed — checking code gates..."
            for gate_result in \
              "lint=${{ needs.lint.result }}" \
              "typecheck=${{ needs.typecheck.result }}" \
              "security=${{ needs.security.result }}" \
              "gitleaks=${{ needs.gitleaks.result }}" \
              "unit-tests=${{ needs.unit-tests.result }}" \
              "integration-tests=${{ needs.integration-tests.result }}"; do
              name="${gate_result%%=*}"
              result="${gate_result##*=}"
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                echo "FAIL: $name = $result"
                failed=true
              else
                echo "OK: $name = $result"
              fi
            done
          else
            echo "No code changes — code gates skipped"
          fi

          # Infra gates
          if [[ "${{ needs.changes.outputs.infra }}" == "true" ]]; then
            echo "Infra changed — checking infra gates..."
            for gate_result in \
              "actionlint=${{ needs.actionlint.result }}" \
              "gitleaks=${{ needs.gitleaks.result }}"; do
              name="${gate_result%%=*}"
              result="${gate_result##*=}"
              if [[ "$result" != "success" && "$result" != "skipped" ]]; then
                echo "FAIL: $name = $result"
                failed=true
              else
                echo "OK: $name = $result"
              fi
            done
          else
            echo "No infra changes — infra gates skipped"
          fi

          # Build gate
          if [[ "${{ needs.changes.outputs.build }}" == "true" ]]; then
            echo "Build files changed — checking build gate..."
            result="${{ needs.build.result }}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "FAIL: build = $result"
              failed=true
            else
              echo "OK: build = $result"
            fi
          else
            echo "No build file changes — build gate skipped"
          fi

          if [[ "$failed" == "true" ]]; then
            echo "One or more triggered CI gates failed"
            exit 1
          fi

          echo "All triggered CI gates passed"
